<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YorkU – Profile</title>
  <link rel="stylesheet" href="../../css/styles.css" />
</head>
<body>
<div id="nav-placeholder"></div>

<div style="padding:32px;max-width:1100px;">
  <div class="page-header">
    <h1>Profile</h1>
    <p>Your account information</p>
  </div>

  <div class="profile-grid">
    <div class="card">
      <h2 class="section-title">User Information</h2>
      <div class="profile-field">
        <div class="profile-icon red">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:18px;height:18px;color:#c8102e"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
        </div>
        <div>
          <div class="profile-field-label">Full Name</div>
          <div class="profile-field-value" id="pf-name">—</div>
        </div>
      </div>
      <div class="profile-field">
        <div class="profile-icon blue">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:18px;height:18px;color:#1565c0"><path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0Zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 6.338 0Z" /></svg>
        </div>
        <div>
          <div class="profile-field-label">YorkU ID</div>
          <div class="profile-field-value" id="pf-id">—</div>
        </div>
      </div>
      <div class="profile-field">
        <div class="profile-icon green">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:18px;height:18px;color:#2e7d32"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" /></svg>
        </div>
        <div>
          <div class="profile-field-label">Email</div>
          <div class="profile-field-value" id="pf-email">—</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">Booking Statistics</h2>
      <div class="booking-stat-item">
        <div class="booking-stat-icon blue">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:22px;height:22px;color:#1565c0"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" /></svg>
        </div>
        <div>
          <div class="booking-stat-label">Upcoming Bookings</div>
          <div class="booking-stat-value">2</div>
        </div>
      </div>
      <div class="booking-stat-item">
        <div class="booking-stat-icon green">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:22px;height:22px;color:#2e7d32"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" /></svg>
        </div>
        <div>
          <div class="booking-stat-label">Completed Bookings</div>
          <div class="booking-stat-value">0</div>
        </div>
      </div>
      <div class="booking-stat-item">
        <div class="booking-stat-icon red">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:22px;height:22px;color:#c8102e"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" /></svg>
        </div>
        <div>
          <div class="booking-stat-label">Total Bookings</div>
          <div class="booking-stat-value">2</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../../js/shared.js"></script>
<script>
  const user = requireAuth('Student');
  document.getElementById('nav-placeholder').innerHTML = buildStudentNav('Profile');
  document.getElementById('pf-name').textContent = user.name;
  document.getElementById('pf-id').textContent = user.id;
  document.getElementById('pf-email').textContent = user.email;
</script>
</body>
</html>
