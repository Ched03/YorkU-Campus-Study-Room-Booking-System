<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YorkU – My Bookings</title>
  <link rel="stylesheet" href="../../css/styles.css" />
</head>
<body>
<div id="nav-placeholder"></div>

<div style="padding:32px;max-width:1100px;">
  <div class="page-header">
    <h1>My Bookings</h1>
    <p>View and manage your study room bookings</p>
  </div>

  <div class="card">
    <h2 class="section-title">Booking History</h2>
    <div class="tabs">
      <button class="tab-btn active" id="tab-upcoming">Upcoming (2)</button>
      <button class="tab-btn" id="tab-history">History (0)</button>
    </div>

    <div id="upcoming-content">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Room</th>
              <th>Floor</th>
              <th>Date</th>
              <th>Time</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="booking-tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="history-content" style="display:none;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Room</th><th>Floor</th><th>Date</th><th>Time</th><th>Status</th></tr>
          </thead>
          <tbody>
            <tr class="empty-row"><td colspan="5">No completed bookings yet.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Cancel Confirm Modal -->
<div class="modal-overlay" id="cancel-modal">
  <div class="modal">
    <h2 class="modal-title">Cancel Booking</h2>
    <p style="color:var(--gray-600);font-size:0.9rem;">Are you sure you want to cancel this booking? This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancel-no">Keep Booking</button>
      <button class="btn btn-danger" id="cancel-yes">Cancel Booking</button>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script src="../../js/shared.js"></script>
<script>
  requireAuth('Student');
  document.getElementById('nav-placeholder').innerHTML = buildStudentNav('My Bookings');

  let myBookings = [
    { room: 'Room 104', floor: 'Floor 1', date: 'Mar 13, 2026', time: '10:00 - 11:00', status: 'Upcoming' },
    { room: 'Room 205', floor: 'Floor 2', date: 'Mar 13, 2026', time: '13:00 - 14:00', status: 'Upcoming' },
  ];
  let cancelIdx = null;

  function renderBookings() {
    const tbody = document.getElementById('booking-tbody');
    document.getElementById('tab-upcoming').textContent = `Upcoming (${myBookings.length})`;
    if (myBookings.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No upcoming bookings.</td></tr>';
      return;
    }
    tbody.innerHTML = myBookings.map((b, i) => `
      <tr>
        <td><strong>${b.room}</strong></td>
        <td>${b.floor}</td>
        <td>
          <span style="display:flex;align-items:center;gap:6px;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:14px;height:14px;color:#9e9e9e"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" /></svg>
            ${b.date}
          </span>
        </td>
        <td>
          <span style="display:flex;align-items:center;gap:6px;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:14px;height:14px;color:#9e9e9e"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
            ${b.time}
          </span>
        </td>
        <td><span class="badge badge-blue">${b.status}</span></td>
        <td><button class="btn btn-danger btn-sm" onclick="openCancel(${i})">Cancel</button></td>
      </tr>`).join('');
  }

  function openCancel(i) {
    cancelIdx = i;
    document.getElementById('cancel-modal').classList.add('open');
  }

  document.getElementById('cancel-yes').addEventListener('click', () => {
    myBookings.splice(cancelIdx, 1);
    document.getElementById('cancel-modal').classList.remove('open');
    renderBookings();
    showToast('Booking cancelled.', 'error');
  });
  document.getElementById('cancel-no').addEventListener('click', () => {
    document.getElementById('cancel-modal').classList.remove('open');
  });
  document.getElementById('cancel-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('cancel-modal'))
      document.getElementById('cancel-modal').classList.remove('open');
  });

  document.getElementById('tab-upcoming').addEventListener('click', () => {
    document.getElementById('tab-upcoming').classList.add('active');
    document.getElementById('tab-history').classList.remove('active');
    document.getElementById('upcoming-content').style.display = '';
    document.getElementById('history-content').style.display = 'none';
  });
  document.getElementById('tab-history').addEventListener('click', () => {
    document.getElementById('tab-history').classList.add('active');
    document.getElementById('tab-upcoming').classList.remove('active');
    document.getElementById('history-content').style.display = '';
    document.getElementById('upcoming-content').style.display = 'none';
  });

  renderBookings();
</script>
</body>
</html>
