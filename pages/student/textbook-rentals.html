<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YorkU – Textbook Rentals</title>
  <link rel="stylesheet" href="../../css/styles.css" />
</head>
<body>
<div id="nav-placeholder"></div>

<div style="padding:32px;max-width:1100px;">
  <div class="page-header">
    <h1>Textbook Rental</h1>
    <p>Reserve textbooks available on Floor 1</p>
  </div>

  <div class="search-bar">
    <div class="search-input-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:18px;height:18px;color:#bdbdbd"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg>
      <input type="text" id="search-input" placeholder="Search by title, course code, or author..." />
    </div>
    <button class="btn btn-primary" id="search-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg>
      Search
    </button>
  </div>

  <div class="books-grid" id="books-grid"></div>
</div>

<div id="toast" class="toast"></div>

<script src="../../js/shared.js"></script>
<script>
  requireAuth('Student');
  document.getElementById('nav-placeholder').innerHTML = buildStudentNav('Textbook Rentals');

  let booksData = BOOKS.map(b => ({ ...b }));

  function renderBooks(books) {
    document.getElementById('books-grid').innerHTML = books.map(b => {
      const avail = b.status === 'available';
      return `
      <div class="book-card">
        <div class="book-header">
          <div class="book-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:22px;height:22px;color:#c8102e"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" /></svg>
          </div>
          <div>
            <div class="book-title">${b.title}</div>
            <div class="book-course">${b.course}</div>
          </div>
        </div>
        <div class="book-author">by ${b.author}</div>
        <div class="book-status ${avail ? 'avail' : 'unavail'}">
          <div class="status-dot ${avail ? 'green' : 'red'}"></div>
          ${avail ? 'Available' : 'Unavailable'}
        </div>
        <button class="btn btn-full btn-sm ${avail ? 'btn-primary' : 'btn-disabled'}"
          ${avail ? `onclick="reserveBook('${b.id}')"` : 'disabled'}>
          ${avail ? 'Reserve Textbook' : 'Currently Unavailable'}
        </button>
      </div>`;
    }).join('');
  }

  function reserveBook(id) {
    const book = booksData.find(b => b.id === id);
    if (book) {
      book.status = 'unavailable';
      showToast(`"${book.title}" reserved!`, 'success');
      renderBooks(booksData);
    }
  }

  function doSearch() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = booksData.filter(b =>
      b.title.toLowerCase().includes(q) ||
      b.course.toLowerCase().includes(q) ||
      b.author.toLowerCase().includes(q)
    );
    renderBooks(filtered);
  }

  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  renderBooks(booksData);
</script>
</body>
</html>
