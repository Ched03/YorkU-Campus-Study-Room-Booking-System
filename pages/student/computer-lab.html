<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YorkU – Computer Lab</title>
  <link rel="stylesheet" href="../../css/styles.css" />
</head>
<body>

  <!-- Student navigation gets added here -->
  <div id="nav-placeholder"></div>

  <!--
    Computer lab page
    This page lets students see which computers are free,
    which one they are using, and which ones are occupied.
  -->

  <div style="padding:32px; max-width:1100px;">

    <!-- Page heading -->
    <div class="page-header">
      <h1>Computer Lab</h1>
      <p>View and access computers on Floor 2</p>
    </div>

    <!-- Stats cards -->
    <div class="stats-row three" style="margin-bottom:24px;">

      <!-- Total computers -->
      <div class="stat-card">
        <div class="stat-label">
          Total Computers
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:18px;height:18px;color:#bdbdbd">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0H3" />
          </svg>
        </div>
        <div class="stat-value" id="total-count">12</div>
      </div>

      <!-- Available computers -->
      <div class="stat-card">
        <div class="stat-label">
          Available
          <span style="width:10px; height:10px; border-radius:50%; background:#2e7d32; display:inline-block;"></span>
        </div>
        <div class="stat-value green" id="avail-count">8</div>
      </div>

      <!-- In use computers -->
      <div class="stat-card">
        <div class="stat-label">
          In Use
          <span style="width:10px; height:10px; border-radius:50%; background:#e57373; display:inline-block;"></span>
        </div>
        <div class="stat-value red" id="inuse-count">4</div>
      </div>

    </div>

    <!-- Computer lab card -->
    <div class="card">
      <h2 class="section-title">Available Computers</h2>

      <!-- Computer cards get added here -->
      <div class="computers-grid" id="computers-grid"></div>

      <!-- Small legend -->
      <div class="lab-legend">

        <div class="legend-item">
          <div class="legend-dot" style="background:#2e7d32;"></div>
          Available – Click to login
        </div>

        <div class="legend-item">
          <div class="legend-dot" style="background:#1565c0;"></div>
          Your session – Click to logout
        </div>

        <div class="legend-item">
          <div class="legend-dot" style="background:#e57373;"></div>
          In use by others
        </div>

      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="../../js/shared.js"></script>

  <script>
    // make sure only students can access this page
    requireAuth('Student');

    // load the student nav bar
    const navPlaceholder = document.getElementById('nav-placeholder');
    navPlaceholder.innerHTML = buildStudentNav('Computer Lab');

    // copy the computer data
    let computers = COMPUTERS.map(function(computer) {
      return {
        ...computer
      };
    });

    // keep track of which computer belongs to the current student
    let mySession = null;

    // useful page elements
    const availCount = document.getElementById('avail-count');
    const inuseCount = document.getElementById('inuse-count');
    const computersGrid = document.getElementById('computers-grid');

    // update the number cards at the top
    function updateStats() {
      let availableTotal = 0;
      let inUseTotal = 0;

      for (let i = 0; i < computers.length; i++) {
        if (computers[i].status === 'available') {
          availableTotal++;
        } else {
          inUseTotal++;
        }
      }

      availCount.textContent = availableTotal;
      inuseCount.textContent = inUseTotal;
    }

    // show all computer cards
    function renderComputers() {
      const monitorIcon = `
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:32px;height:32px;display:block;margin:0 auto 8px;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0H3" />
        </svg>
      `;

      let cardsHtml = '';

      for (let i = 0; i < computers.length; i++) {
        const computer = computers[i];

        let cardClass = '';
        let statusLabel = '';
        let clickCode = '';

        if (computer.id === mySession) {
          cardClass = 'mine';
          statusLabel = 'Your Session';
        } else if (computer.status === 'available') {
          cardClass = 'available';
          statusLabel = 'Available';
        } else {
          cardClass = 'in-use';
          statusLabel = 'In Use';
        }

        const canClick = computer.status === 'available' || computer.id === mySession;

        if (canClick) {
          clickCode = `onclick="toggleComputer('${computer.id}')"`
        }

        cardsHtml += `
          <div class="computer-card ${cardClass}" ${clickCode}>
            ${monitorIcon}
            <div class="computer-id">${computer.id}</div>
            <div class="computer-status">${statusLabel}</div>
          </div>
        `;
      }

      computersGrid.innerHTML = cardsHtml;
      updateStats();
    }

    // log in or log out of a computer
    function toggleComputer(id) {
      let selectedComputer = null;

      for (let i = 0; i < computers.length; i++) {
        if (computers[i].id === id) {
          selectedComputer = computers[i];
          break;
        }
      }

      if (!selectedComputer) {
        return;
      }

      // if this is already the student's session, log out
      if (mySession === id) {
        selectedComputer.status = 'available';
        mySession = null;
        showToast('Logged out of ' + id + '.');
      }

      // if no session is active and the computer is free, log in
      else if (mySession === null && selectedComputer.status === 'available') {
        selectedComputer.status = 'in-use';
        mySession = id;
        showToast('Logged in to ' + id + '!', 'success');
      }

      renderComputers();
    }

    // first render when page loads
    renderComputers();
  </script>

</body>
</html>
