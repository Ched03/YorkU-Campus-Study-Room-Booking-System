<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YorkU – Computer Lab</title>
  <link rel="stylesheet" href="../../css/styles.css" />
</head>
<body>
<div id="nav-placeholder"></div>

<div style="padding:32px;max-width:1100px;">
  <div class="page-header">
    <h1>Computer Lab</h1>
    <p>View and access computers on Floor 2</p>
  </div>

  <div class="stats-row three" style="margin-bottom:24px;">
    <div class="stat-card">
      <div class="stat-label">Total Computers
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:18px;height:18px;color:#bdbdbd"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0H3" /></svg>
      </div>
      <div class="stat-value" id="total-count">12</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Available
        <span style="width:10px;height:10px;border-radius:50%;background:#2e7d32;display:inline-block;"></span>
      </div>
      <div class="stat-value green" id="avail-count">8</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">In Use
        <span style="width:10px;height:10px;border-radius:50%;background:#e57373;display:inline-block;"></span>
      </div>
      <div class="stat-value red" id="inuse-count">4</div>
    </div>
  </div>

  <div class="card">
    <h2 class="section-title">Available Computers</h2>
    <div class="computers-grid" id="computers-grid"></div>

    <div class="lab-legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#2e7d32;"></div>
        Available – Click to login
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#1565c0;"></div>
        Your session – Click to logout
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#e57373;"></div>
        In use by others
      </div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script src="../../js/shared.js"></script>
<script>
  requireAuth('Student');
  document.getElementById('nav-placeholder').innerHTML = buildStudentNav('Computer Lab');

  let computers = COMPUTERS.map(c => ({ ...c }));
  let mySession = null;

  function updateStats() {
    const avail = computers.filter(c => c.status === 'available').length;
    const inuse = computers.filter(c => c.status !== 'available').length;
    document.getElementById('avail-count').textContent = avail;
    document.getElementById('inuse-count').textContent = inuse;
  }

  function renderComputers() {
    const monitorIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:32px;height:32px;display:block;margin:0 auto 8px;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0H3" /></svg>`;
    document.getElementById('computers-grid').innerHTML = computers.map(c => {
      let cls, statusLabel;
      if (c.id === mySession) {
        cls = 'mine'; statusLabel = 'Your Session';
      } else if (c.status === 'available') {
        cls = 'available'; statusLabel = 'Available';
      } else {
        cls = 'in-use'; statusLabel = 'In Use';
      }
      const clickable = c.status === 'available' || c.id === mySession;
      return `
      <div class="computer-card ${cls}" ${clickable ? `onclick="toggleComputer('${c.id}')"` : ''}>
        ${monitorIcon}
        <div class="computer-id">${c.id}</div>
        <div class="computer-status">${statusLabel}</div>
      </div>`;
    }).join('');
    updateStats();
  }

  function toggleComputer(id) {
    const c = computers.find(x => x.id === id);
    if (!c) return;
    if (mySession === id) {
      // logout
      c.status = 'available';
      mySession = null;
      showToast(`Logged out of ${id}.`);
    } else if (!mySession && c.status === 'available') {
      c.status = 'in-use';
      mySession = id;
      showToast(`Logged in to ${id}!`, 'success');
    }
    renderComputers();
  }

  renderComputers();
</script>
</body>
</html>
