<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YorkU Study Rooms – Login</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:36px;height:36px;color:#fff">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 3.741-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5" />
      </svg>
    </div>
    <h1 class="login-title">York University</h1>
    <p class="login-sub">Study Room Booking System</p>

    <div id="error-msg" style="display:none;background:#fde8eb;color:#c8102e;padding:10px 14px;border-radius:8px;font-size:0.85rem;margin-bottom:16px;"></div>

    <div class="form-group" style="margin-bottom:16px;">
      <label class="form-label" for="yorku-id">YorkU ID</label>
      <input class="form-input" type="text" id="yorku-id" placeholder="123456789" maxlength="9" />
      <span class="form-hint">YorkU ID must be a 9-digit number.</span>
    </div>

    <div class="form-group" style="margin-bottom:20px;">
      <label class="form-label" for="password">Password</label>
      <div class="password-wrap">
        <input class="form-input" type="password" id="password" placeholder="Enter your password" style="padding-right:44px;" />
        <button class="password-toggle" type="button" id="pwd-toggle" aria-label="Toggle password">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:18px;height:18px"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
        </button>
      </div>
    </div>

    <button class="btn btn-primary btn-full" id="login-btn" style="padding:13px;">Login</button>
    <a href="#" class="forgot-link">Forgot password?</a>

    <hr class="login-divider" />
    <p class="quick-login-label">Quick login as:</p>
    <div class="quick-btns">
      <button class="quick-btn" data-role="student">Student</button>
      <button class="quick-btn" data-role="staff">Staff</button>
      <button class="quick-btn" data-role="admin">Admin</button>
    </div>
    <p class="quick-ids">Student: 123456789 | Staff: S001 | Admin: A001</p>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
  // Quick credential map
  const CREDENTIALS = {
    '123456789': { name: 'John Smith', id: '123456789', role: 'Student', email: 'jsmith@yorku.ca' },
    '234567890': { name: 'Sarah Johnson', id: '234567890', role: 'Student', email: 'sjohnson@yorku.ca' },
    'S001':      { name: 'Staff Member', id: 'S001', role: 'Staff', email: 'staff@yorku.ca' },
    'A001':      { name: 'Admin User', id: 'A001', role: 'Admin', email: 'admin@yorku.ca' },
  };

  function doLogin(id) {
    const user = CREDENTIALS[id];
    if (!user) {
      const err = document.getElementById('error-msg');
      err.textContent = 'Invalid YorkU ID. Try: 123456789, S001, or A001.';
      err.style.display = 'block';
      return;
    }
    setCurrentUser(user);
    if (user.role === 'Student') window.location.href = 'pages/student/home.html';
    else if (user.role === 'Staff') window.location.href = 'pages/staff/dashboard.html';
    else window.location.href = 'pages/admin/dashboard.html';
  }

  document.getElementById('login-btn').addEventListener('click', () => {
    const id = document.getElementById('yorku-id').value.trim();
    doLogin(id);
  });

  document.getElementById('yorku-id').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const role = btn.dataset.role;
      const id = role === 'student' ? '123456789' : role === 'staff' ? 'S001' : 'A001';
      document.getElementById('yorku-id').value = id;
      doLogin(id);
    });
  });

  document.getElementById('pwd-toggle').addEventListener('click', () => {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  // If already logged in, redirect
  const user = getCurrentUser();
  if (user) {
    if (user.role === 'Student') window.location.href = 'pages/student/home.html';
    else if (user.role === 'Staff') window.location.href = 'pages/staff/dashboard.html';
    else window.location.href = 'pages/admin/dashboard.html';
  }
</script>
</body>
</html>
